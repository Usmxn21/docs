name: Validate Docs

# Gate every change to the published docs. If the OpenAPI spec is malformed, a link is
# broken, or a known client-breaking pattern reappears, this fails BEFORE Mintlify tries
# to build — so the live site can never silently break (as it did on 2026-06-17).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate docs (OpenAPI + links + accuracy guards)
        run: node scripts/validate-docs.mjs
